services:
  - type: web
    name: chkobba
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Baked into Vite client build (GA4)
      - key: VITE_GA_MEASUREMENT_ID
        value: G-BJCKN12FND
